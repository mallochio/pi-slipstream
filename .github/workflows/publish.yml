name: Publish

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    if: github.repository == 'OrestesK/pi-slipstream-compact'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Use latest npm for trusted publishing
        run: npm install --global npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="$(node -p "require('./package.json').version")"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "package.json version is not valid semver for release: $version" >&2
            exit 1
          fi
          if [[ "$tag" != "v$version" ]]; then
            echo "Tag $tag does not match package.json version $version; expected v$version" >&2
            exit 1
          fi

      - name: Run tests and typecheck
        run: npm run check

      - name: Verify npm package contents
        run: npm pack --dry-run --json

      - name: Publish to npm
        run: npm publish --access public --provenance
